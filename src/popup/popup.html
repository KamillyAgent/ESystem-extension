<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESystem</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header>
      <span class="logo">🛡</span>
      <h1>ESystem</h1>
    </header>

    <div id="status" class="status status--loading">Loading...</div>

    <div class="stats">
      <div class="stat">
        <div class="stat__value" id="blocksToday">—</div>
        <div class="stat__label">today</div>
      </div>
      <div class="stat">
        <div class="stat__value" id="blocksTotal">—</div>
        <div class="stat__label">all-time</div>
      </div>
      <div class="stat">
        <div class="stat__value" id="lastSync">—</div>
        <div class="stat__label">last sync</div>
      </div>
    </div>

    <div class="actions">
      <button id="syncBtn" class="btn btn--primary">Sync now</button>
      <button id="settingsBtn" class="btn">Settings</button>
    </div>

    <footer>
      <span id="version">v0.1.0</span>
    </footer>
  </div>

  <script src="../vendor/browser-polyfill.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
